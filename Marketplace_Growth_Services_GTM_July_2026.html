<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Growth Services - Marketplacer</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   MARKETPLACER PRESENTATION STYLES
   Shared by presentation-template.html
   Slide canvas: 1280 × 720px (16:9), scaled via JS to fill viewport
   ═══════════════════════════════════════════════════════════════ */

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── DESIGN TOKENS ── */
:root {
  --col-primary:       #005C71;
  --col-primary-dark:  #003D4E;
  --col-primary-light: #DBE9EE;
  --col-accent:        #00CFB4;
  --col-accent-dark:   #009E8A;
  --col-accent-light:  #D7FFF9;
  --col-dark:          #070E14;
  --col-mid:           #1E2D3D;
  --col-muted:         #627180;
  --col-border:        #DDE5EC;
  --col-bg:            #F4F8FB;
  --col-white:         #FFFFFF;
  --font:              'Manrope', system-ui, sans-serif;

  /* Chart palette - sequential from brand colours */
  --chart-1: #005C71;
  --chart-2: #00CFB4;
  --chart-3: #003D4E;
  --chart-4: #009E8A;
  --chart-5: #DBE9EE;
  --chart-6: #D7FFF9;

  /* Semantic colours */
  --col-success: #059669;
  --col-success-bg: #ECFDF5;
  --col-warning: #B45309;
  --col-warning-bg: #FFFBEB;
  --col-danger:  #DC2626;
  --col-danger-bg: #FEF2F2;
}

html, body {
  font-family: var(--font);
  background: #0a1220;
  color: var(--col-dark);
  -webkit-font-smoothing: antialiased;
  height: 100%;
  overflow: hidden;
}

/* ══════════════════════════════════════════════════════════════
   PRESENTER CHROME
   ══════════════════════════════════════════════════════════════ */

/* ── TOP BAR ── */
.top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: var(--col-dark);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 200;
  gap: 16px;
}
.top-bar-brand {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 800; color: white; letter-spacing: 0.5px;
  flex-shrink: 0;
}
.top-bar-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--col-accent); }
.top-bar-title {
  font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.5);
  flex: 1; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.top-bar-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.ctrl-btn {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; padding: 6px 12px;
  font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.65);
  cursor: pointer; font-family: var(--font); transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.13); color: white; }
.ctrl-btn.accent { background: var(--col-accent); color: var(--col-dark); border-color: var(--col-accent); }
.ctrl-btn.accent:hover { background: var(--col-accent-dark); border-color: var(--col-accent-dark); }
.slide-counter {
  font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.3);
  font-variant-numeric: tabular-nums; min-width: 54px; text-align: center;
}

/* ── STAGE ── */
.stage {
  position: fixed;
  top: 52px; left: 0; right: 0; bottom: 100px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

/* ── SLIDE SCALER ── */
.slide-scaler {
  width: 1280px; height: 720px;
  transform-origin: center center;
  position: relative; flex-shrink: 0;
}
.slide-frame {
  width: 1280px; height: 720px;
  border-radius: 10px; overflow: hidden;
  box-shadow: 0 40px 100px rgba(0,0,0,0.6);
  position: relative;
}

/* ── THUMBNAIL STRIP ── */
.thumb-strip {
  position: fixed; bottom: 0; left: 0; right: 0; height: 100px;
  background: rgba(7,14,20,0.97);
  backdrop-filter: blur(16px);
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; gap: 10px;
  padding: 0 20px; overflow-x: auto; z-index: 200;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent;
}
.thumb {
  flex-shrink: 0; width: 134px; height: 75px;
  border-radius: 6px; overflow: hidden; cursor: pointer;
  border: 2px solid rgba(255,255,255,0.08);
  transition: all 0.15s; position: relative; background: #111c29;
}
.thumb:hover { border-color: rgba(255,255,255,0.28); transform: translateY(-2px); }
.thumb.active { border-color: var(--col-accent); }
.thumb-preview {
  width: 1280px; height: 720px;
  transform-origin: top left;
  transform: scale(calc(134 / 1280));
  pointer-events: none; position: absolute; top: 0; left: 0;
  font-family: var(--font); -webkit-font-smoothing: antialiased;
}
.thumb-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 3px 6px;
  font-size: 8px; font-weight: 700;
  color: rgba(255,255,255,0.5);
  background: rgba(0,0,0,0.45);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.4;
}
.thumb.active .thumb-label { color: var(--col-accent); }

/* ── KEYBOARD HINT ── */
.key-hint {
  position: fixed; bottom: 112px; right: 20px;
  font-size: 11px; color: rgba(255,255,255,0.18);
  font-weight: 500; display: flex; align-items: center; gap: 6px;
  z-index: 201; font-family: var(--font);
}
kbd {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px; padding: 2px 6px;
  font-size: 10px; font-family: var(--font); color: rgba(255,255,255,0.3);
}

/* ── LOADING OVERLAY ── */
#loadingOverlay {
  position: fixed; inset: 0; background: #0a1220;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px; z-index: 500;
  transition: opacity 0.4s ease;
}
#loadingOverlay.hidden { opacity: 0; pointer-events: none; }
.loading-logo { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 800; color: white; letter-spacing: 0.5px; }
.loading-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--col-accent); }
.loading-msg { font-size: 13px; color: rgba(255,255,255,0.35); font-weight: 500; font-family: var(--font); }
.loading-bar-wrap { width: 200px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
.loading-bar { height: 100%; background: var(--col-accent); border-radius: 2px; transition: width 0.3s ease; width: 0%; }

/* ══════════════════════════════════════════════════════════════
   SLIDE BASE
   ══════════════════════════════════════════════════════════════ */
.slide {
  position: absolute; inset: 0; width: 1280px; height: 720px;
  display: none; font-family: var(--font);
  overflow: hidden;
}
.slide.active { display: block; }

/* Grid texture overlay (applied to dark slides) */
.slide-grid-bg::before {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,207,180,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,207,180,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

/* ── SLIDE FOOTER ── */
.slide-footer {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 40px;
  border-top: 1px solid rgba(255,255,255,0.07);
  z-index: 10;
}
.slide-footer.light { border-top-color: var(--col-border); }
.sf-logo {
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
  display: flex; align-items: center; gap: 5px;
  color: rgba(255,255,255,0.2);
}
.sf-logo .d { width: 5px; height: 5px; border-radius: 50%; background: var(--col-accent); opacity: 0.4; }
.sf-logo.dark { color: var(--col-muted); }
.sf-logo.dark .d { opacity: 1; }
.sf-pg { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.18); }
.sf-pg.dark { color: rgba(98,113,128,0.6); }
.sf-conf { font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: rgba(255,255,255,0.15); }
.sf-conf.dark { color: rgba(98,113,128,0.4); }

/* ══════════════════════════════════════════════════════════════
   SHARED PRESENTATION COMPONENTS
   ══════════════════════════════════════════════════════════════ */

/* ── EYEBROW ── */
.s-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--col-accent); margin-bottom: 14px;
}
.s-eyebrow::before {
  content: ''; display: block; width: 20px; height: 2px;
  background: var(--col-accent); flex-shrink: 0;
}
.s-eyebrow.on-light { color: var(--col-primary); }
.s-eyebrow.on-light::before { background: var(--col-primary); }

/* ── HEADINGS ── */
.s-h1 { font-size: 68px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.04; }
.s-h2 { font-size: 42px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.1; }
.s-h3 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
.s-h4 { font-size: 20px; font-weight: 700; letter-spacing: -0.015em; line-height: 1.3; }
.s-body { font-size: 16px; color: var(--col-muted); line-height: 1.75; }
.s-body-lg { font-size: 18px; color: var(--col-muted); line-height: 1.7; }
.s-em { font-style: normal; color: var(--col-accent); }
.s-em-primary { font-style: normal; color: var(--col-primary); }

/* ── LOGO MARK ── */
.s-logo { display: flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 800; letter-spacing: -0.01em; }
.s-logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--col-accent); }
.s-logo.white { color: white; }
.s-logo.dark { color: var(--col-dark); }

/* ── BADGE ── */
.s-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--col-accent-light); color: var(--col-primary);
  border-radius: 100px; padding: 5px 14px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
}
.s-badge-glass {
  display: inline-flex; align-items: center;
  background: rgba(255,255,255,0.1); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.2); color: white;
  border-radius: 100px; padding: 5px 14px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
}
.s-badge-status {
  display: inline-flex; padding: 3px 10px; border-radius: 100px;
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
.s-badge-green { background: var(--col-success-bg); color: var(--col-success); }
.s-badge-amber { background: var(--col-warning-bg); color: var(--col-warning); }
.s-badge-red   { background: var(--col-danger-bg);  color: var(--col-danger); }
.s-badge-blue  { background: var(--col-primary-light); color: var(--col-primary); }

/* ── DIVIDER ── */
.s-divider { width: 48px; height: 3px; background: var(--col-accent); border-radius: 2px; margin: 16px 0; }

/* ── ICON CONTAINER ── */
.s-icon {
  width: 48px; height: 48px; border-radius: 12px;
  background: var(--col-accent-light);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  margin-bottom: 16px;
}
.s-icon svg { width: 22px; height: 22px; color: var(--col-primary); }
.s-icon.on-dark { background: rgba(0,207,180,0.12); }
.s-icon.on-dark svg { color: var(--col-accent); }

/* ── STAT BLOCK ── */
.s-stat { text-align: center; }
.s-stat-num { font-size: 64px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; color: white; }
.s-stat-num .a { color: var(--col-accent); }
.s-stat-bar { display: block; width: 32px; height: 2px; background: var(--col-accent); margin: 10px auto; border-radius: 2px; }
.s-stat-label { font-size: 13px; color: rgba(255,255,255,0.4); font-weight: 500; line-height: 1.45; max-width: 130px; margin: 0 auto; }
/* On light backgrounds */
.s-stat.on-light .s-stat-num { color: var(--col-primary); }
.s-stat.on-light .s-stat-label { color: var(--col-muted); }

/* ── FEATURE CHECK LIST ── */
.s-checklist { display: flex; flex-direction: column; gap: 12px; }
.s-check-item { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--col-dark); font-weight: 500; line-height: 1.45; }
.s-check-dot {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--col-accent-light);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.s-check-dot svg { width: 12px; height: 12px; color: var(--col-primary); }

/* ── QUOTE ── */
.s-pull-quote {
  font-size: 24px; font-weight: 600; line-height: 1.55; color: white;
  position: relative; padding-left: 24px;
}
.s-pull-quote::before {
  content: ''; position: absolute; left: 0; top: 4px; bottom: 4px;
  width: 3px; background: var(--col-accent); border-radius: 2px;
}

/* ── STEP / PROCESS ── */
.s-step { display: flex; align-items: flex-start; gap: 16px; }
.s-step-num {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--col-accent); color: var(--col-dark);
  font-weight: 800; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
}
.s-step-num.outline {
  background: transparent;
  border: 2px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.4);
}

/* ── CARD ── */
.s-card {
  background: white; border: 1px solid var(--col-border);
  border-radius: 16px; padding: 28px 28px 32px;
  display: flex; flex-direction: column;
  box-shadow: 0 1px 4px rgba(7,14,20,0.06);
}
.s-card-dark {
  background: var(--col-mid); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px; padding: 28px 28px 32px;
  display: flex; flex-direction: column;
}
.s-card-title { font-size: 17px; font-weight: 700; color: var(--col-dark); margin-bottom: 8px; letter-spacing: -0.01em; }
.s-card-body  { font-size: 13px; color: var(--col-muted); line-height: 1.65; flex: 1; }
.s-card-stat  { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--col-border); font-size: 28px; font-weight: 800; letter-spacing: -0.03em; color: var(--col-primary); }
.s-card-stat small { font-size: 13px; font-weight: 500; color: var(--col-muted); margin-left: 4px; letter-spacing: 0; }

/* ── TABLE ── */
.s-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; border: 1px solid var(--col-border); border-radius: 12px; overflow: hidden; }
.s-table thead th { background: var(--col-primary-light); color: var(--col-primary); font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--col-border); }
.s-table tbody td { padding: 12px 16px; border-bottom: 1px solid var(--col-border); color: var(--col-muted); vertical-align: middle; background: white; }
.s-table tbody tr:last-child td { border-bottom: none; }
.s-table tbody td:first-child { font-weight: 600; color: var(--col-dark); }
.s-table tbody tr:nth-child(even) td { background: var(--col-bg); }

/* ── PROGRESS BAR ── */
.s-progress { height: 6px; background: rgba(255,255,255,0.08); border-radius: 100px; overflow: hidden; }
.s-progress-fill { height: 100%; background: var(--col-accent); border-radius: 100px; }
.s-progress.on-light { background: var(--col-border); }
.s-progress.on-light .s-progress-fill { background: var(--col-primary); }

/* ── AGENDA ITEM ── */
.s-agenda-item {
  display: flex; align-items: center; gap: 20px;
  background: white; border: 1px solid var(--col-border);
  border-radius: 12px; padding: 16px 22px;
}
.s-agenda-num {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--col-primary-light); color: var(--col-primary);
  font-weight: 800; font-size: 13px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.s-agenda-text { font-size: 15px; font-weight: 600; color: var(--col-dark); flex: 1; }
.s-agenda-duration { font-size: 12px; color: var(--col-muted); font-weight: 500; flex-shrink: 0; }

/* ── TIMELINE ── */
.s-timeline { display: flex; align-items: stretch; gap: 0; position: relative; }
.s-timeline::before {
  content: ''; position: absolute; top: 19px; left: 0; right: 0;
  height: 2px; background: var(--col-border); z-index: 0;
}
.s-tl-item { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; }
.s-tl-dot { width: 20px; height: 20px; border-radius: 50%; background: var(--col-border); border: 3px solid white; margin-bottom: 16px; flex-shrink: 0; }
.s-tl-dot.done   { background: var(--col-accent); box-shadow: 0 0 0 3px var(--col-accent-light); }
.s-tl-dot.active { background: var(--col-primary); box-shadow: 0 0 0 4px var(--col-primary-light); }
.s-tl-content { background: var(--col-bg); border: 1px solid var(--col-border); border-radius: 12px; padding: 16px 18px; width: calc(100% - 16px); }
.s-tl-content.active { background: var(--col-primary); border-color: var(--col-primary); }
.s-tl-period { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--col-accent); margin-bottom: 4px; }
.s-tl-content.active .s-tl-period { color: rgba(255,255,255,0.55); }
.s-tl-title { font-size: 14px; font-weight: 700; color: var(--col-dark); margin-bottom: 5px; line-height: 1.3; }
.s-tl-content.active .s-tl-title { color: white; }
.s-tl-body { font-size: 12px; color: var(--col-muted); line-height: 1.6; }
.s-tl-content.active .s-tl-body { color: rgba(255,255,255,0.55); }

/* ── TESTIMONIAL ── */
.s-testimonial { background: white; border: 1px solid var(--col-border); border-radius: 16px; padding: 32px; position: relative; }
.s-testimonial::before { content: '"'; position: absolute; top: 16px; left: 26px; font-size: 72px; font-weight: 800; color: var(--col-accent-light); line-height: 1; pointer-events: none; }
.s-testimonial-quote { font-size: 17px; line-height: 1.65; color: var(--col-dark); font-weight: 500; padding-top: 18px; position: relative; z-index: 1; margin-bottom: 20px; }
.s-testimonial-author { display: flex; align-items: center; gap: 12px; }
.s-testimonial-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--col-primary), var(--col-accent)); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: white; flex-shrink: 0; }
.s-testimonial-name { font-size: 14px; font-weight: 700; color: var(--col-dark); }
.s-testimonial-role { font-size: 12px; color: var(--col-muted); margin-top: 1px; }
.s-testimonial-company { margin-left: auto; font-size: 12px; font-weight: 700; color: var(--col-muted); opacity: 0.6; }

/* ── TWO-COL LAYOUT ── */
.s-two-col { display: flex; height: 100%; }
.s-col-text { display: flex; flex-direction: column; justify-content: center; padding: 64px 64px 64px 72px; }
.s-col-visual { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; position: relative; overflow: hidden; }
.s-col-visual.bg-light { background: var(--col-bg); }
.s-col-visual.bg-dark  { background: var(--col-mid); }

/* ── LOGO WALL ── */
.s-logo-wall { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
.s-logo-chip {
  background: white; border: 1px solid var(--col-border); border-radius: 10px;
  padding: 14px 22px; font-size: 13px; font-weight: 800; color: var(--col-muted);
  display: flex; align-items: center; justify-content: center;
  letter-spacing: -0.01em;
}
.s-logo-chip.dark {
  background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.35);
}

/* ── CALLOUT BOX ── */
.s-callout {
  background: var(--col-primary-light); border: 1px solid var(--col-primary);
  border-left: 4px solid var(--col-primary);
  border-radius: 10px; padding: 16px 20px;
  font-size: 14px; color: var(--col-primary); font-weight: 500; line-height: 1.6;
}
.s-callout.accent {
  background: var(--col-accent-light); border-color: var(--col-accent);
  border-left-color: var(--col-accent); color: var(--col-primary-dark);
}
.s-callout.dark {

/* ══════════════════════════════════════════════════════════════
   CHART COMPONENTS
   All charts are rendered as inline SVG by the JS component library.
   These classes handle the surrounding container and labels.
   ══════════════════════════════════════════════════════════════ */

.chart-wrap { width: 100%; height: 100%; position: relative; }
.chart-title { font-size: 13px; font-weight: 700; color: var(--col-dark); margin-bottom: 4px; }
.chart-subtitle { font-size: 12px; color: var(--col-muted); margin-bottom: 16px; }
.chart-svg { display: block; width: 100%; overflow: visible; }

/* Bar chart */
.chart-bar { fill: var(--col-primary); transition: fill 0.2s; cursor: default; }
.chart-bar:hover { fill: var(--col-accent); }
.chart-bar-accent { fill: var(--col-accent); }
.chart-bar-light { fill: var(--col-primary-light); }

/* Line chart */
.chart-line { fill: none; stroke: var(--col-accent); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.chart-area { fill: url(#areaGrad); }
.chart-dot { fill: white; stroke: var(--col-accent); stroke-width: 2.5; }

/* Axes */
.chart-axis-line { stroke: var(--col-border); stroke-width: 1; }
.chart-axis-line.dark { stroke: rgba(255,255,255,0.1); }
.chart-grid-line { stroke: var(--col-border); stroke-width: 1; stroke-dasharray: 4 4; }
.chart-grid-line.dark { stroke: rgba(255,255,255,0.06); }
.chart-tick-label { font-family: var(--font); font-size: 12px; fill: var(--col-muted); font-weight: 500; }
.chart-tick-label.dark { fill: rgba(255,255,255,0.35); }
.chart-axis-label { font-family: var(--font); font-size: 11px; fill: var(--col-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
.chart-value-label { font-family: var(--font); font-size: 12px; font-weight: 700; fill: var(--col-dark); }
.chart-value-label.dark { fill: white; }

/* Donut chart */
.donut-segment { transition: opacity 0.2s; cursor: default; }
.donut-segment:hover { opacity: 0.82; }
.donut-center-val { font-family: var(--font); font-size: 32px; font-weight: 800; fill: var(--col-dark); letter-spacing: -0.03em; }
.donut-center-label { font-family: var(--font); font-size: 12px; fill: var(--col-muted); font-weight: 500; }

/* Legend */
.chart-legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 12px; }
.chart-legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--col-muted); font-weight: 500; }
.chart-legend-item.dark { color: rgba(255,255,255,0.45); }
.chart-legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

            <p style="font-size:12.5px;color:#627180;line-height:1.7;margin:0;">Clarks was expanding into a third-party brand partner model. They needed to onboard a pipeline of sellers quickly - with high product data quality and no disruption to an internal team with no prior marketplace ops experience.</p>

      ${conf ? `<div class="sf-conf${txtCls}">Confidential</div>` : '<div></div>'}
    </div>`;
  };

  // Standard eyebrow
  const eyebrow = (text, onLight = false) =>
    text ? `<div class="s-eyebrow${onLight ? ' on-light' : ''}">${esc(text)}</div>` : '';

  // Accent-highlighted headline (wraps **text** in accent span)
  const headline = (text, cls = '') => {
    if (!text) return '';
    const html = esc(text).replace(/\*\*(.*?)\*\*/g, `<em class="s-em">$1</em>`);
    return `<div class="${cls}">${html}</div>`;
  };

  /* ─────────────────────────────────────────────────────────────
     CHART RENDERERS
     ───────────────────────────────────────────────────────────── */

  /**
   * Vertical bar chart
   * data: [ { label, value, color? } ]
   * options: { yLabel, dark, showValues, colors, maxY }
   */
  function barChart(data, w, h, options = {}) {
    const { yLabel='', dark=false, showValues=true, colors, maxY } = options;
    const padL=52, padR=20, padT=30, padB=44;
    const chartW = w - padL - padR;
    const chartH = h - padT - padB;
    const max = maxY || Math.ceil(Math.max(...data.map(d=>d.value)) * 1.15);
    const barW = Math.min(52, (chartW / data.length) * 0.55);
    const gap  = chartW / data.length;
    const tickCls = dark ? 'chart-tick-label dark' : 'chart-tick-label';
    const gridCls = dark ? 'chart-grid-line dark'  : 'chart-grid-line';
    const axisCls = dark ? 'chart-axis-line dark'   : 'chart-axis-line';
    const valCls  = dark ? 'chart-value-label dark' : 'chart-value-label';
    const palette = colors || C.chart;

    // Y grid lines
    const yTicks = 5;
    let gridLines = '';
    for (let i = 0; i <= yTicks; i++) {
      const y = padT + chartH - (i / yTicks) * chartH;
      const val = (max * i / yTicks);
      const label = val >= 1000 ? (val/1000)+'k' : val % 1 === 0 ? val : val.toFixed(1);
      gridLines += `<line class="${gridCls}" x1="${padL}" y1="${y}" x2="${padL+chartW}" y2="${y}"/>`;
      gridLines += `<text class="${tickCls}" x="${padL-8}" y="${y+4}" text-anchor="end">${label}</text>`;
    }

    // Bars + labels
    let bars = '';
    data.forEach((d, i) => {
      const barH = (d.value / max) * chartH;
      const x = padL + i * gap + gap/2 - barW/2;
      const y = padT + chartH - barH;
      const fill = d.color || palette[i % palette.length];
      bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="4" fill="${fill}"/>`;
      if (showValues) {
        bars += `<text class="${valCls}" x="${x + barW/2}" y="${y-6}" text-anchor="middle">${esc(fmtVal(d.value))}</text>`;
      }
      // X label
      const labelY = padT + chartH + 18;
      bars += `<text class="${tickCls}" x="${padL + i*gap + gap/2}" y="${labelY}" text-anchor="middle">${esc(d.label)}</text>`;
    });

    // Axis
    const axis = `<line class="${axisCls}" x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}"/>
      <line class="${axisCls}" x1="${padL}" y1="${padT+chartH}" x2="${padL+chartW}" y2="${padT+chartH}"/>`;

    // Y axis label
    const yAxisLabel = yLabel
      ? `<text class="chart-axis-label" x="${14}" y="${padT + chartH/2}" text-anchor="middle" transform="rotate(-90,14,${padT+chartH/2})">${esc(yLabel)}</text>`
      : '';

    return svgEl(w, h, gridLines + axis + bars + yAxisLabel);
  }

  /**
   * Horizontal bar chart
   * data: [ { label, value, color? } ]
   */
  function hBarChart(data, w, h, options = {}) {
    const { dark=false, showValues=true, colors, maxX, xLabel='' } = options;
    const padL=140, padR=60, padT=16, padB=30;
    const chartW = w - padL - padR;
    const chartH = h - padT - padB;
    const max = maxX || Math.ceil(Math.max(...data.map(d=>d.value)) * 1.2);
    const rowH = chartH / data.length;
    const barH = Math.min(28, rowH * 0.55);
    const tickCls = dark ? 'chart-tick-label dark' : 'chart-tick-label';
    const gridCls = dark ? 'chart-grid-line dark'  : 'chart-grid-line';
    const axisCls = dark ? 'chart-axis-line dark'   : 'chart-axis-line';
    const valCls  = dark ? 'chart-value-label dark' : 'chart-value-label';
    const palette = colors || C.chart;

    let gridLines = '';
    const xTicks = 5;
    for (let i = 0; i <= xTicks; i++) {
      const x = padL + (i / xTicks) * chartW;
      const val = max * i / xTicks;
      const label = val >= 1000 ? (val/1000)+'k' : val % 1 === 0 ? val : val.toFixed(1);
      gridLines += `<line class="${gridCls}" x1="${x}" y1="${padT}" x2="${x}" y2="${padT+chartH}"/>`;
      gridLines += `<text class="${tickCls}" x="${x}" y="${padT+chartH+16}" text-anchor="middle">${label}</text>`;
    }

    let bars = '';
    data.forEach((d, i) => {
      const barW = (d.value / max) * chartW;
      const y = padT + i * rowH + rowH/2 - barH/2;
      const fill = d.color || palette[i % palette.length];
      bars += `<rect x="${padL}" y="${y}" width="${barW}" height="${barH}" rx="4" fill="${fill}"/>`;
      // Label left
      bars += `<text class="${tickCls}" x="${padL-10}" y="${y+barH/2+4}" text-anchor="end">${esc(d.label)}</text>`;
      // Value right
      if (showValues) {
        bars += `<text class="${valCls}" x="${padL+barW+8}" y="${y+barH/2+4}">${esc(fmtVal(d.value))}</text>`;
      }
    });

    const axis = `<line class="${axisCls}" x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}"/>
      <line class="${axisCls}" x1="${padL}" y1="${padT+chartH}" x2="${padL+chartW}" y2="${padT+chartH}"/>`;

    return svgEl(w, h, gridLines + axis + bars);
  }

  /**
   * Line chart (with area fill)
   * data: [ { label, value } ] or multi-series: [ { label, series: [ { name, value } ] } ]
   * options: { dark, yLabel, smooth, multiSeries }
   */
  function lineChart(data, w, h, options = {}) {
    const { dark=false, yLabel='', multiSeries=false } = options;
    const padL=52, padR=24, padT=30, padB=44;
    const chartW = w - padL - padR;
    const chartH = h - padT - padB;
    const tickCls = dark ? 'chart-tick-label dark' : 'chart-tick-label';
    const gridCls = dark ? 'chart-grid-line dark'  : 'chart-grid-line';
    const axisCls = dark ? 'chart-axis-line dark'   : 'chart-axis-line';
    const palette = [C.accent, C.primary, '#009E8A', '#003D4E'];

    let allValues;
    if (multiSeries && data[0]?.series) {
      allValues = data.flatMap(d => d.series.map(s => s.value));
    } else {
      allValues = data.map(d => d.value);
    }
    const max = Math.ceil(Math.max(...allValues) * 1.15);
    const min = 0;
    const range = max - min;

    const xScale = i => padL + (i / (data.length - 1)) * chartW;
    const yScale = v => padT + chartH - ((v - min) / range) * chartH;

    // Grid
    let gridLines = '';
    for (let i = 0; i <= 5; i++) {
      const y = padT + (i / 5) * chartH;
      const val = max - (i / 5) * range;
      const label = val >= 1000 ? (val/1000).toFixed(1)+'k' : val % 1 === 0 ? val : val.toFixed(1);
      gridLines += `<line class="${gridCls}" x1="${padL}" y1="${y}" x2="${padL+chartW}" y2="${y}"/>`;
      gridLines += `<text class="${tickCls}" x="${padL-8}" y="${y+4}" text-anchor="end">${label}</text>`;
    }

    // X labels
    let xLabels = '';
    data.forEach((d, i) => {
      xLabels += `<text class="${tickCls}" x="${xScale(i)}" y="${padT+chartH+18}" text-anchor="middle">${esc(d.label)}</text>`;
    });

    // Axes
    const axis = `<line class="${axisCls}" x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}"/>
      <line class="${axisCls}" x1="${padL}" y1="${padT+chartH}" x2="${padL+chartW}" y2="${padT+chartH}"/>`;

    // Series
    let seriesHtml = '';
    const gradId = 'areaGrad_' + Math.random().toString(36).slice(2,6);

    if (!multiSeries) {
      const points = data.map((d, i) => `${xScale(i)},${yScale(d.value)}`).join(' ');
      const areaClose = `${xScale(data.length-1)},${padT+chartH} ${padL},${padT+chartH}`;
      seriesHtml += `<defs><linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${C.accent}" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="${C.accent}" stop-opacity="0"/>
      </linearGradient></defs>`;
      seriesHtml += `<polygon points="${points} ${areaClose}" fill="url(#${gradId})"/>`;
      seriesHtml += `<polyline points="${points}" class="chart-line"/>`;
      // Dots
      data.forEach((d, i) => {
        seriesHtml += `<circle cx="${xScale(i)}" cy="${yScale(d.value)}" r="4" class="chart-dot"/>`;
        seriesHtml += `<text class="${dark ? 'chart-value-label dark' : 'chart-value-label'}" x="${xScale(i)}" y="${yScale(d.value)-10}" text-anchor="middle" font-size="11">${esc(fmtVal(d.value))}</text>`;
      });
    } else {
      // Multi-series
      const seriesNames = data[0].series.map(s => s.name);
      seriesNames.forEach((name, si) => {
        const color = palette[si % palette.length];
        const points = data.map((d, i) => `${xScale(i)},${yScale(d.series[si].value)}`).join(' ');
        seriesHtml += `<polyline points="${points}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
        data.forEach((d, i) => {
          seriesHtml += `<circle cx="${xScale(i)}" cy="${yScale(d.series[si].value)}" r="4" fill="white" stroke="${color}" stroke-width="2.5"/>`;
        });
      });
    }

    const yAxisLabel = yLabel
      ? `<text class="chart-axis-label" x="14" y="${padT+chartH/2}" text-anchor="middle" transform="rotate(-90,14,${padT+chartH/2})">${esc(yLabel)}</text>`
      : '';

    return svgEl(w, h, gridLines + axis + seriesHtml + xLabels + yAxisLabel);
  }

  /**
   * Donut / Pie chart
   * data: [ { label, value, color? } ]
   * options: { centerLabel, centerValue, size }
   */
  function donutChart(data, size = 260, options = {}) {
    const { centerLabel='Total', centerValue } = options;
    const cx = size/2, cy = size/2;
    const outerR = size * 0.42;
    const innerR = size * 0.27;
    const total = data.reduce((s, d) => s + d.value, 0);
    const centerVal = centerValue !== undefined ? centerValue : total;
    const palette = [C.primary, C.accent, C.primaryDark, C.accentDark, C.primaryLight, C.accentLight];

    let angle = -90; // start from top
    let paths = '';

    data.forEach((d, i) => {
      const slice = (d.value / total) * 360;
      const startRad = (angle * Math.PI) / 180;
      const endRad   = ((angle + slice) * Math.PI) / 180;
      const x1 = cx + outerR * Math.cos(startRad);
      const y1 = cy + outerR * Math.sin(startRad);
      const x2 = cx + outerR * Math.cos(endRad);
      const y2 = cy + outerR * Math.sin(endRad);
      const ix1 = cx + innerR * Math.cos(endRad);
      const iy1 = cy + innerR * Math.sin(endRad);
      const ix2 = cx + innerR * Math.cos(startRad);
      const iy2 = cy + innerR * Math.sin(startRad);
      const large = slice > 180 ? 1 : 0;
      const fill = d.color || palette[i % palette.length];
      paths += `<path class="donut-segment" d="M${x1},${y1} A${outerR},${outerR} 0 ${large},1 ${x2},${y2} L${ix1},${iy1} A${innerR},${innerR} 0 ${large},0 ${ix2},${iy2} Z" fill="${fill}"/>`;
      angle += slice;
    });

    // Center text
    const center = `<text class="donut-center-val" x="${cx}" y="${cy+8}" text-anchor="middle">${esc(fmtVal(centerVal))}</text>
      <text class="donut-center-label" x="${cx}" y="${cy+26}" text-anchor="middle">${esc(centerLabel)}</text>`;

    return svgEl(size, size, paths + center);
  }

  /**
   * Stacked bar chart
   * data: [ { label, segments: [ { name, value, color? } ] } ]
   */
  function stackedBarChart(data, w, h, options = {}) {
    const { dark=false, yLabel='', showValues=true } = options;
    const padL=52, padR=20, padT=30, padB=44;
    const chartW = w - padL - padR;
    const chartH = h - padT - padB;
    const totals = data.map(d => d.segments.reduce((s, seg) => s + seg.value, 0));
    const max = Math.ceil(Math.max(...totals) * 1.15);
    const barW = Math.min(52, (chartW / data.length) * 0.55);
    const gap  = chartW / data.length;
    const tickCls = dark ? 'chart-tick-label dark' : 'chart-tick-label';
    const gridCls = dark ? 'chart-grid-line dark'  : 'chart-grid-line';
    const axisCls = dark ? 'chart-axis-line dark'   : 'chart-axis-line';
    const palette = C.chart;

    let gridLines = '';
    for (let i = 0; i <= 5; i++) {
      const y = padT + chartH - (i/5) * chartH;
      const val = max * i / 5;
      const label = val >= 1000 ? (val/1000)+'k' : val % 1 === 0 ? val : val.toFixed(1);
      gridLines += `<line class="${gridCls}" x1="${padL}" y1="${y}" x2="${padL+chartW}" y2="${y}"/>`;
      gridLines += `<text class="${tickCls}" x="${padL-8}" y="${y+4}" text-anchor="end">${label}</text>`;
    }

    let bars = '';
    data.forEach((d, i) => {
      const x = padL + i * gap + gap/2 - barW/2;
      let yOff = padT + chartH;
      d.segments.forEach((seg, si) => {
        const segH = (seg.value / max) * chartH;
        yOff -= segH;
        const fill = seg.color || palette[si % palette.length];
        const radius = si === d.segments.length - 1 ? `rx="4"` : '';
        bars += `<rect x="${x}" y="${yOff}" width="${barW}" height="${segH}" ${radius} fill="${fill}"/>`;
      });
      if (showValues) {
        const totalH = (totals[i] / max) * chartH;
        bars += `<text class="${dark ? 'chart-value-label dark' : 'chart-value-label'}" x="${x+barW/2}" y="${padT+chartH-totalH-6}" text-anchor="middle">${esc(fmtVal(totals[i]))}</text>`;
      }
      bars += `<text class="${tickCls}" x="${padL+i*gap+gap/2}" y="${padT+chartH+18}" text-anchor="middle">${esc(d.label)}</text>`;
    });

    const axis = `<line class="${axisCls}" x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}"/>
      <line class="${axisCls}" x1="${padL}" y1="${padT+chartH}" x2="${padL+chartW}" y2="${padT+chartH}"/>`;

    return svgEl(w, h, gridLines + axis + bars);
  }

  /** Legend HTML for any chart */
  function legendHtml(items, dark = false) {
    return `<div class="chart-legend">` + items.map((item, i) => {
      const col = item.color || C.chart[i % C.chart.length];
      return `<div class="chart-legend-item${dark?' dark':''}">
        <div class="chart-legend-dot" style="background:${col}"></div>
        ${esc(item.name || item.label)}
      </div>`;
    }).join('') + `</div>`;
  }

  /* ─────────────────────────────────────────────────────────────
     SLIDE RENDERERS
     Each renderer(slide, index, total, deck) → HTMLElement
     ───────────────────────────────────────────────────────────── */

  const renderers = {

    /* ── COVER ── */
    cover(s, i, total, deck) {
      const wrap = div('slide', '');
      wrap.style.background = C.dark;
      wrap.innerHTML = `
        <div style="position:absolute;inset:0;background:radial-gradient(ellipse 80% 80% at 110% 110%,rgba(0,92,113,0.7) 0%,transparent 60%),radial-gradient(ellipse 60% 60% at -10% -10%,rgba(0,207,180,0.12) 0%,transparent 55%)"></div>
        <div style="position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,207,180,0.04) 0%,transparent 50%)"></div>
        <div class="slide-content space-between" style="position:relative;z-index:1">
          <div>
            ${eyebrow(s.eyebrow || deck.audience || '')}
            <h1 class="s-h1" style="color:white;max-width:740px;margin-bottom:18px">${headline(s.headline || deck.title).replace('<div class="">','').replace('</div>','')}</h1>
            <p style="font-size:19px;color:rgba(255,255,255,0.42);max-width:560px;line-height:1.65;font-weight:400">${esc(s.sub || s.subtitle || '')}</p>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div>
              <div style="font-size:14px;color:rgba(255,255,255,0.55);font-weight:600;margin-bottom:4px">${esc(s.presenter || deck.presenter || '')}</div>
              <div style="font-size:13px;color:rgba(255,255,255,0.28);font-weight:500">${esc(s.date || deck.date || '')}</div>
            </div>
            <div style="display:flex;align-items:center;gap:14px">
              ${logoImg('white', 28)}
              ${deck.confidential !== false ? `<div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:5px 14px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.22)">Confidential</div>` : ''}
            </div>
          </div>
        </div>`;
      return wrap;
    },

    /* ── AGENDA ── */
    agenda(s, i, total, deck) {
      const items = s.items || [];
      const wrap = div('slide', '');
      wrap.style.background = C.bg;
      const itemsHtml = items.map((item, idx) => `
        <div class="s-agenda-item">
          <div class="s-agenda-num">${String(idx+1).padStart(2,'0')}</div>
          <span class="s-agenda-text">${esc(item.title || item)}</span>
          ${item.duration ? `<span class="s-agenda-duration">${esc(item.duration)}</span>` : ''}
        </div>`).join('');
      wrap.innerHTML = `
        <div class="slide-content" style="flex-direction:row;gap:64px;align-items:center;padding:56px 72px">
          <div style="flex:0 0 320px">
            ${eyebrow(s.eyebrow || "Today's Session", false)}
            <h2 class="s-h2" style="color:${C.dark};margin-bottom:12px">${headline(s.headline || "What we'll **cover**").replace('<div class="">','').replace('</div>','')}</h2>
            ${s.sub ? `<p class="s-body" style="margin-bottom:16px">${esc(s.sub)}</p>` : ''}
            <div class="s-divider"></div>
            ${s.total ? `<p style="font-size:12px;color:${C.muted}">Total · <strong style="color:${C.dark}">${esc(s.total)}</strong></p>` : ''}
          </div>
          <div style="flex:1;display:flex;flex-direction:column;gap:10px">${itemsHtml}</div>
        </div>
        ${footer(i+1, false, deck.confidential !== false)}`;
      return wrap;
    },

    /* ── SECTION DIVIDER ── */
    section(s, i, total, deck) {
      const wrap = div('slide', '');
      wrap.style.background = C.primary;
      wrap.innerHTML = `
        <div style="position:absolute;top:0;right:0;width:440px;height:100%;background:linear-gradient(135deg,rgba(0,207,180,0.18) 0%,transparent 60%)"></div>
        <div class="slide-bg-number">${esc(s.number || String(i+1).padStart(2,'0'))}</div>
        <div class="slide-content" style="justify-content:center">
          <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:14px">${esc(s.label || '')}</div>
          <h2 class="s-h1" style="color:white;max-width:640px;margin-bottom:18px">${headline(s.headline || s.title || '').replace('<div class="">','').replace('</div>','')}</h2>
          ${s.sub ? `<p style="font-size:18px;color:rgba(255,255,255,0.5);max-width:520px;line-height:1.65">${esc(s.sub)}</p>` : ''}
        </div>
        ${footer(i+1, true, deck.confidential !== false)}`;
      return wrap;
    },

    /* ── STATS BAND ── */
    stats(s, i, total, deck) {
      const stats = s.stats || [];
      const wrap = div('slide', '');
      wrap.style.background = C.dark;
      // Building blocks — four stat cards
      const statsHtml = stats.map(stat => `
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:28px 16px 24px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-bottom:none;border-radius:12px 12px 0 0">
          <div class="s-stat-num" style="margin-bottom:6px">${esc(stat.value)}</div>
          <span class="s-stat-bar" style="margin-bottom:10px"></span>
          <div class="s-stat-label" style="margin-bottom:6px">${esc(stat.label)}</div>
          ${stat.sub ? `<div style="font-size:11px;color:rgba(255,255,255,0.25);margin-top:2px">${esc(stat.sub)}</div>` : ''}
        </div>`).join('');
      // Foundation bar
      const foundationHtml = s.footerNote ? `
        <div style="background:rgba(0,207,180,0.12);border:1px solid rgba(0,207,180,0.35);border-radius:0 0 14px 14px;padding:20px 28px;display:flex;align-items:center;gap:16px">
          <div style="flex-shrink:0;width:36px;height:36px;border-radius:50%;background:rgba(0,207,180,0.2);display:flex;align-items:center;justify-content:center">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00CFB4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </div>
          <div style="font-size:15px;font-weight:500;color:rgba(255,255,255,0.85);line-height:1.55">${esc(s.footerNote)}</div>
        </div>` : '';
      wrap.innerHTML = `
        <div style="position:absolute;inset:0;background:radial-gradient(ellipse 70% 70% at 100% 50%,rgba(0,92,113,0.4) 0%,transparent 60%)"></div>
        <div class="slide-content space-between" style="position:relative;z-index:1">
          <div>
            ${eyebrow(s.eyebrow || '')}
            <h2 class="s-h2" style="color:white;max-width:660px;margin-bottom:8px">${headline(s.headline || '').replace('<div class="">','').replace('</div>','')}</h2>
            ${s.sub ? `<p style="font-size:16px;color:rgba(255,255,255,0.38);line-height:1.6">${esc(s.sub)}</p>` : ''}
          </div>
          <div style="margin-bottom:40px">
            <div style="display:flex;align-items:stretch;gap:2px">${statsHtml}</div>
            ${foundationHtml}

    /* ── TABLE ── */

      }).join('')}</tr>`).join('')}</tbody>`;

        <div class="slide-content">

        </div>`).join('');
      wrap.innerHTML = `
        <div style="position:absolute;inset:0;background:radial-gradient(ellipse 90% 90% at 0% 100%,rgba(0,92,113,0.65) 0%,transparent 55%),radial-gradient(ellipse 50% 50% at 100% 0%,rgba(0,207,180,0.08) 0%,transparent 60%)"></div>
        <div style="position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,207,180,0.03) 0%,transparent 40%)"></div>
        <div class="slide-content space-between" style="position:relative;z-index:1">
          <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
            ${eyebrow(s.eyebrow || 'Next Steps')}
            <h2 class="s-h1" style="color:white;max-width:820px;margin-bottom:22px">${headline(s.headline||deck.title||'').replace('<div class="">','').replace('</div>','')}</h2>
            ${s.sub ? `<p style="font-size:19px;color:rgba(255,255,255,0.4);max-width:560px;line-height:1.65;margin-bottom:32px">${esc(s.sub)}</p>` : ''}
            <div style="display:flex;gap:16px;flex-wrap:wrap">${contacts}</div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:8px">
            ${logoImg('white', 28)}
            ${deck.confidential !== false ? `<div style="font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:rgba(255,255,255,0.18)">Confidential</div>` : ''}
          </div>
        </div>`;
      return wrap;
    },

    /* ── BLANK / CUSTOM ── */
    blank(s, i, total, deck) {
      const wrap = div('slide', '');
      wrap.style.background = s.background || C.white;
      const padTop = s.compact ? '32px' : '56px';
      wrap.innerHTML = `
        <div class="slide-content" style="padding-top:${padTop}">
          ${eyebrow(s.eyebrow||'', true)}
          <h2 class="s-h2" style="color:${C.dark};margin-bottom:10px">${headline(s.headline||'').replace('<div class="">','').replace('</div>','')}</h2>
          ${s.sub ? `<p class="s-body-lg" style="margin-bottom:24px">${esc(s.sub)}</p>` : ''}
          ${s.body ? `<div style="flex:1;min-height:0;font-size:15px;color:${C.muted};line-height:1.75;display:flex;flex-direction:column">${s.body}</div>` : ''}
        </div>
        ${footer(i+1, false, deck.confidential !== false)}`;
      return wrap;
    },

    /* ── IMAGE (full-bleed or captioned) ── */
    image(s, i, total, deck) {
      const wrap = div('slide', '');
      const dark = s.dark || false;
      wrap.style.background = dark ? C.dark : C.white;

      // Decide layout: full-bleed vs two-col (when headline or body present)
      const hasCopy = s.headline || s.body || s.eyebrow;

      if (!hasCopy) {
        // Full-bleed image
        wrap.innerHTML = `
          <div style="position:absolute;inset:0;overflow:hidden">
            ${s.url
              ? `<img src="${esc(s.url)}" alt="${esc(s.alt||'')}" style="width:100%;height:100%;object-fit:cover;display:block">`
              : `<div style="width:100%;height:100%;background:${C.mid};display:flex;align-items:center;justify-content:center">
                   <div style="color:rgba(255,255,255,0.2);font-size:14px;font-weight:600">Add image URL or base64 src</div>
                 </div>`
            }
          </div>
          ${s.caption ? `
            <div style="position:absolute;bottom:0;left:0;right:0;padding:20px 40px;background:linear-gradient(transparent,rgba(7,14,20,0.7));z-index:2">
              <p style="font-size:14px;color:rgba(255,255,255,0.75);font-weight:500">${esc(s.caption)}</p>
            </div>` : ''}
          ${footer(i+1, true, deck.confidential !== false)}`;
      } else {
        // Two-col: copy left, image right
        wrap.innerHTML = `
          <div style="display:flex;height:100%">
            <div style="flex:0 0 480px;padding:64px 56px 80px 72px;display:flex;flex-direction:column;justify-content:center;background:${dark ? C.mid : C.white}">
              ${eyebrow(s.eyebrow || '', !dark)}
              <h2 class="s-h2" style="color:${dark?'white':C.dark};margin-bottom:14px">${headline(s.headline||'').replace('<div class="">','').replace('</div>','')}</h2>
              ${s.body ? `<p class="s-body-lg" style="color:${dark?'rgba(255,255,255,0.5)':C.muted}">${esc(s.body)}</p>` : ''}
            </div>
            <div style="flex:1;position:relative;overflow:hidden">
              ${s.url
                ? `<img src="${esc(s.url)}" alt="${esc(s.alt||'')}" style="width:100%;height:100%;object-fit:cover;display:block">`
                : `<div style="width:100%;height:100%;background:${C.bg};display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px">
                     <div style="width:64px;height:64px;color:${C.border}">${ICONS.layers}</div>
                     <div style="font-size:13px;color:${C.muted}">Add image URL in slide config</div>
                   </div>`
              }
              ${s.caption ? `
                <div style="position:absolute;bottom:0;left:0;right:0;padding:16px 24px;background:linear-gradient(transparent,rgba(7,14,20,0.65))">
                  <p style="font-size:12px;color:rgba(255,255,255,0.7);font-weight:500">${esc(s.caption)}</p>
                </div>` : ''}
            </div>
          </div>
          ${footer(i+1, dark, deck.confidential !== false)}`;
      }
      return wrap;
    },

    /* ── VIDEO ── */
    video(s, i, total, deck) {
      const wrap = div('slide', '');
      wrap.style.background = C.dark;
      const url = s.url || '';

      // Thumbnail/poster: use s.poster if provided, else a branded gradient placeholder
      const hasPoster = !!s.poster;
      const posterHtml = hasPoster
        ? `<img src="${esc(s.poster)}" alt="${esc(s.alt||'Video thumbnail')}" style="width:100%;height:100%;object-fit:cover;display:block">`
        : `<div style="width:100%;height:100%;background:linear-gradient(135deg,${C.primaryDark} 0%,${C.primary} 60%,${C.mid} 100%)"></div>`;

      // Play button - links to the video URL in a new tab if URL is set
      const playBtn = url
        ? `<a href="${esc(url)}" target="_blank" rel="noopener noreferrer" title="Open video" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-decoration:none;z-index:2">
            <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
              <div style="width:80px;height:80px;border-radius:50%;background:rgba(0,207,180,0.9);backdrop-filter:blur(8px);border:3px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;transition:transform 0.2s,background 0.2s;box-shadow:0 8px 32px rgba(0,207,180,0.4)">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="${C.dark}" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              </div>
              <div style="background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:6px 18px;display:flex;align-items:center;gap:8px">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                <span style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.75);font-family:${C.font||'Manrope, sans-serif'}">Open video in new tab</span>
              </div>
            </div>
          </a>`
        : `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2">
            <div style="display:flex;flex-direction:column;align-items:center;gap:12px">
              <div style="width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              </div>
              <span style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.3);font-family:Manrope,sans-serif">No video URL set</span>
            </div>
          </div>`;

      // Duration badge
      const durationBadge = s.duration
        ? `<div style="position:absolute;bottom:16px;right:16px;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;color:white;z-index:3">${esc(s.duration)}</div>`
        : '';

      const hasCopy = s.headline || s.eyebrow;
      if (!hasCopy) {
        // Pure full-bleed thumbnail
        wrap.innerHTML = `
          <div style="position:absolute;inset:0">
            ${posterHtml}
            ${playBtn}
            ${durationBadge}
          </div>
          ${footer(i+1, true, deck.confidential !== false)}`;
      } else {
        // Branded header + thumbnail below
        wrap.innerHTML = `
          <div style="position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 100% 0%,rgba(0,92,113,0.35) 0%,transparent 55%)"></div>
          <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column">
            <div style="padding:28px 48px 16px;flex-shrink:0">
              ${eyebrow(s.eyebrow||'')}
              <h2 class="s-h3" style="color:white">${headline(s.headline||'').replace('<div class="">','').replace('</div>','')}</h2>
            </div>
            <div style="flex:1;padding:0 48px 56px;min-height:0">
              <div style="width:100%;height:100%;border-radius:10px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.5);position:relative">
                ${posterHtml}
                ${playBtn}
                ${durationBadge}
              </div>
            </div>
            ${s.caption ? `
              <div style="position:absolute;bottom:52px;left:48px;right:48px;text-align:center">
                <span style="font-size:12px;color:rgba(255,255,255,0.35);font-weight:500">${esc(s.caption)}</span>
              </div>` : ''}
          </div>
          ${footer(i+1, true, deck.confidential !== false)}`;
      }
      return wrap;
    },

  };

  /* Visual placeholder for two-col slides without explicit visuals */
  function buildVisualPlaceholder(s) {
    return `<div style="width:100%;max-width:400px;background:white;border:1px solid ${C.border};border-radius:16px;padding:28px;box-shadow:0 8px 32px rgba(7,14,20,0.08)">
      <div style="height:160px;background:linear-gradient(135deg,${C.primary},${C.accent});border-radius:10px;margin-bottom:16px;display:flex;align-items:center;justify-content:center">
        <div style="width:48px;height:48px;color:white;opacity:0.6">${ICONS.layers}</div>
      </div>
      <div style="height:12px;background:${C.bg};border-radius:6px;margin-bottom:10px"></div>
      <div style="height:12px;background:${C.bg};border-radius:6px;width:70%;margin-bottom:10px"></div>
      <div style="height:12px;background:${C.bg};border-radius:6px;width:85%"></div>
    </div>`;
  }

  /* ─────────────────────────────────────────────────────────────
     PRESENTER UI
     ───────────────────────────────────────────────────────────── */
  let _slides = [];
  let _current = 0;
  let _deck = {};

  function goTo(n) {
    _slides[_current].classList.remove('active');
    _current = Math.max(0, Math.min(_slides.length - 1, n));
    _slides[_current].classList.add('active');
    document.getElementById('mkt-cur').textContent = _current + 1;
    const titleEl = document.getElementById('mkt-title');
    if (titleEl) titleEl.textContent = _deck.slides?.[_current]?.headline || _deck.title || '';
    document.querySelectorAll('.thumb').forEach((t, i) => {
      t.classList.toggle('active', i === _current);
      if (i === _current) t.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    });
  }

  function rescale() {
    const scaler = document.getElementById('mkt-scaler');
    const stage  = document.getElementById('mkt-stage');
    if (!scaler || !stage) return;
    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
    const sw = isFs ? window.innerWidth  : stage.clientWidth  - 24;
    const sh = isFs ? window.innerHeight : stage.clientHeight - 24;
    const scale = Math.min(sw / 1280, sh / 720);
    scaler.style.transform = `scale(${scale})`;
    if (isFs) {
      scaler.style.position = 'fixed'; scaler.style.top = '50%'; scaler.style.left = '50%';
      scaler.style.marginTop = '-360px'; scaler.style.marginLeft = '-640px'; scaler.style.zIndex = '9999';
    } else {
      scaler.style.position = ''; scaler.style.top = ''; scaler.style.left = '';
      scaler.style.marginTop = ''; scaler.style.marginLeft = ''; scaler.style.zIndex = '';
    }
  }

  function buildThumbs(frameEl) {
    const strip = document.getElementById('mkt-thumbs');
    if (!strip) return;
    _slides.forEach((slide, i) => {
      const thumb = document.createElement('div');
      thumb.className = 'thumb' + (i === 0 ? ' active' : '');
      thumb.onclick = () => goTo(i);

      const preview = document.createElement('div');
      preview.className = 'thumb-preview';
      preview.style.cssText = slide.style.cssText;
      Array.from(slide.children).forEach(c => preview.appendChild(c.cloneNode(true)));

      const label = document.createElement('div');
      label.className = 'thumb-label';
      label.textContent = `${i+1}  ${_deck.slides?.[i]?.headline || ''}`;

      thumb.appendChild(preview);
      thumb.appendChild(label);
      strip.appendChild(thumb);
    });
  }

  /* ─────────────────────────────────────────────────────────────
     PUBLIC INIT
     ───────────────────────────────────────────────────────────── */
  function init(deck) {
    _deck = deck;
    const loading = document.getElementById('loadingOverlay');
    const bar = document.getElementById('loadingBar');
    const msg = document.getElementById('loadingMsg');

    // Render slides
    const frame = document.getElementById('mkt-frame');
    if (!frame) { console.error('MKT: #mkt-frame not found'); return; }

    const total = deck.slides.length;
    deck.slides.forEach((s, i) => {
      if (bar) bar.style.width = `${((i+1)/total)*80}%`;
      if (msg) msg.textContent = `Building slide ${i+1} of ${total}…`;
      const renderer = renderers[s.type] || renderers.blank;
      const slideEl = renderer(s, i, total, deck);
      slideEl.classList.add('slide');
      if (i === 0) slideEl.classList.add('active');
      frame.appendChild(slideEl);
      _slides.push(slideEl);
    });

    document.getElementById('mkt-total').textContent = total;
    document.getElementById('mkt-cur').textContent   = 1;
    const titleEl = document.getElementById('mkt-title');
    if (titleEl) titleEl.textContent = deck.slides[0]?.headline || deck.title || '';

    buildThumbs(frame);
    rescale();
    window.addEventListener('resize', rescale);

    // Keyboard nav
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); goTo(_current + 1); }
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')  { e.preventDefault(); goTo(_current - 1); }
      if (e.key === 'f' || e.key === 'F') toggleFullscreen();
      if (e.key === 'Home') goTo(0);
      if (e.key === 'End')  goTo(total - 1);
    });

    // Expose nav
    document.getElementById('mkt-prev')?.addEventListener('click', () => goTo(_current - 1));
    document.getElementById('mkt-next')?.addEventListener('click', () => goTo(_current + 1));
    document.getElementById('mkt-fs')?.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', rescale);
    document.addEventListener('webkitfullscreenchange', rescale);
    document.addEventListener('mozfullscreenchange', rescale);

    // Hide loading
    if (bar) bar.style.width = '100%';
    setTimeout(() => {
      if (loading) loading.classList.add('hidden');
    }, 350);
  }

  function enterFullscreen() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
  }
  function exitFullscreen() {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
  }
  function toggleFullscreen() {
    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
    if (isFs) exitFullscreen(); else enterFullscreen();
  }

  return { init, goTo, C, ICONS };
})();

</script>
<script>
MKT.init(DECK);
</script>
</body>
